name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAGES_BASE_PATH: "/snk-front/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static files with Docker
        run: |
          docker build --build-arg BASE_PATH="${{ env.GITHUB_PAGES_BASE_PATH }}" --target builder -t pvp-builder .
          
          # Создаем контейнер и копируем dist
          docker create --name pvp-temp pvp-builder
          docker cp pvp-temp:/app/dist ./dist
          docker rm pvp-temp

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4