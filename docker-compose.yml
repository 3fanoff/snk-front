name: "pvp_snk_layout"
services:
  dev:
    container_name: "pvp_dev"
    build:
      context: .
      target: development
    ports:
      - "2605:2605"
    volumes:
      - type: bind
        source: ./
        target: /app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: "development"
  prod:
    container_name: "pvp_prod"
    build:
      context: .
      target: production
    ports:
      - "2606:80"
    environment:
      NODE_ENV: "production"
    #command: npm run start
volumes:
  node_modules:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./node_modules
